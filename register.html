<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | FP</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/fp-logo.svg">
  <link rel="stylesheet" href="assets/css/register.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card" aria-label="Formulario de registro">
      <a class="brand-line" href="index.html" aria-label="Inicio FP">
        <img src="assets/img/fp-logo.svg" alt="Logo FP">
        <span>FP Estudio</span>
      </a>

      <div class="form-header">
        <p class="eyebrow">Version 0.0.2</p>
        <h1>Crear cuenta</h1>
        <p>Registra tus datos para entrar al dashboard de estudio.</p>
      </div>

      <form id="registerForm" novalidate>
        <div class="field-group">
          <label for="name">Nombre</label>
          <input id="name" name="name" type="text" autocomplete="name" placeholder="Tu nombre" required>
        </div>

        <div class="field-group">
          <label for="username">Usuario</label>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="usuario123" required>
        </div>

        <div class="field-group">
          <label for="email">Correo</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="field-group">
          <label for="password">Contrasena</label>
          <div class="password-field">
            <input id="password" name="password" type="password" autocomplete="new-password" placeholder="minimo 6 caracteres" required>
            <button class="icon-button" id="togglePassword" type="button" aria-label="Mostrar contrasena" title="Mostrar contrasena">
              <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 3l18 18"></path>
                <path d="M10.7 5.2A10.8 10.8 0 0 1 12 5c6.5 0 10 7 10 7a18.5 18.5 0 0 1-3.1 4.2"></path>
                <path d="M6.6 6.6A18.8 18.8 0 0 0 2 12s3.5 7 10 7a10.4 10.4 0 0 0 4.4-1"></path>
                <path d="M9.9 9.9A3 3 0 0 0 14.1 14.1"></path>
              </svg>
            </button>
          </div>
        </div>

        <button class="submit-button" type="submit">Registrarme</button>
      </form>

      <p class="helper-text account-link">Ya tienes cuenta? <a href="index.html">Iniciar sesion</a></p>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/register.js"></script>
</body>
</html>
