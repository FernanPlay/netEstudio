<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | FP</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/fp-logo.svg">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="login-page">
    <section class="brand-panel" aria-label="Presentacion">
      <div class="brand-content">
        <a class="brand-mark" href="index.html" aria-label="Inicio FP">
          <img src="assets/img/fp-logo.svg" alt="Logo FP">
          <span>FP</span>
        </a>
        <img class="brand-visual" src="assets/img/login-visual.svg" alt="Panel seguro de acceso">
        <p class="eyebrow">Sistema FP</p>
        <h1>Acceso rapido y seguro</h1>
        <p>Panel de ingreso optimizado para computadora y celular.</p>
      </div>
    </section>

    <section class="form-panel" aria-label="Formulario de inicio de sesion">
      <form class="login-card" id="loginForm" novalidate>
        <div class="mobile-logo">
          <img src="assets/img/fp-logo.svg" alt="Logo FP">
          <span>FP</span>
        </div>

        <div class="form-header">
          <p class="eyebrow">Version 0.0.1</p>
          <h2>Iniciar sesion</h2>
          <p>Ingresa tus credenciales para continuar.</p>
        </div>

        <div class="field-group">
          <label for="username">Usuario</label>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="admin" required>
        </div>

        <div class="field-group">
          <label for="password">Contrasena</label>
          <div class="password-field">
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="123456" required>
            <button class="icon-button" id="togglePassword" type="button" aria-label="Mostrar contrasena" title="Mostrar contrasena">
              <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 3l18 18"></path>
                <path d="M10.7 5.2A10.8 10.8 0 0 1 12 5c6.5 0 10 7 10 7a18.5 18.5 0 0 1-3.1 4.2"></path>
                <path d="M6.6 6.6A18.8 18.8 0 0 0 2 12s3.5 7 10 7a10.4 10.4 0 0 0 4.4-1"></path>
                <path d="M9.9 9.9A3 3 0 0 0 14.1 14.1"></path>
              </svg>
            </button>
          </div>
        </div>

        <p class="helper-text">Prueba: usuario <strong>admin</strong> y contrasena <strong>123456</strong>.</p>

        <button class="submit-button" type="submit">Entrar</button>

      </form>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/login.js"></script>
</body>
</html>
